<div>
  <p class="text-surface-500 dark:text-surface-400 text-xs font-medium uppercase">Assignee</p>

  @if (assignee(); as a) {
    <p class="mt-1 flex items-center gap-2 text-sm">
      <span class="font-medium">{{ a.fullName }}</span>
      @if (assignedToMe()) {
        <span
          class="rounded bg-blue-100 px-1.5 py-0.5 text-xs text-blue-800 dark:bg-blue-950/40 dark:text-blue-200"
        >
          you
        </span>
      }
    </p>
  } @else {
    <p class="text-surface-500 dark:text-surface-400 mt-1 text-sm italic">Unassigned</p>
  }

  @if (canManage()) {
    <div class="mt-3 flex flex-wrap items-center gap-2">
      @if (!assignedToMe()) {
        <p-button
          label="Take ticket"
          icon="pi pi-user-plus"
          size="small"
          [loading]="assigning()"
          (onClick)="takeTicket()"
        />
      }
      @if (assignee()) {
        <p-button
          label="Unassign"
          icon="pi pi-user-minus"
          severity="secondary"
          [text]="true"
          size="small"
          [loading]="assigning()"
          (onClick)="unassign()"
        />
      }
      <p-select
        [options]="agents()"
        optionLabel="fullName"
        optionValue="id"
        placeholder="Assign to agent…"
        [loading]="agentsLoading()"
        [showClear]="false"
        styleClass="flex-1 min-w-48"
        (onShow)="openPicker()"
        (onChange)="assignTo($event.value)"
      />
    </div>
  }
</div>
