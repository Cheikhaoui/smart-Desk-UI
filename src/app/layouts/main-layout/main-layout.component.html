<div class="bg-surface-50 dark:bg-surface-950 min-h-screen">
  <header
    class="border-surface-200 dark:border-surface-800 bg-surface-0 dark:bg-surface-900 sticky top-0 z-40 border-b"
  >
    <div class="mx-auto flex max-w-7xl items-center justify-between px-6 py-3">
      <div class="flex items-center gap-8">
        <a routerLink="/dashboard" class="text-lg font-semibold">SmartDesk</a>
        <nav class="flex items-center gap-4 text-sm">
          <a
            routerLink="/dashboard"
            routerLinkActive="text-primary font-medium"
            class="text-surface-600 dark:text-surface-300 hover:text-primary transition-colors"
          >
            Dashboard
          </a>
          <a
            routerLink="/tickets"
            routerLinkActive="text-primary font-medium"
            class="text-surface-600 dark:text-surface-300 hover:text-primary transition-colors"
          >
            Tickets
          </a>
        </nav>
      </div>

      <div class="flex items-center gap-2">
        <p-button
          [icon]="themeIcon()"
          severity="secondary"
          [text]="true"
          [rounded]="true"
          (onClick)="toggleTheme()"
          ariaLabel="Toggle theme"
        />

        @if (user(); as u) {
          <button
            type="button"
            (click)="openUserMenu($event)"
            class="hover:bg-surface-100 dark:hover:bg-surface-800 flex items-center gap-2 rounded-md px-3 py-2 transition-colors"
          >
            <div
              class="bg-primary text-primary-contrast flex h-8 w-8 items-center justify-center rounded-full text-sm font-medium"
            >
              {{ u.fullName?.charAt(0) ?? '?' }}
            </div>
            <div class="text-left">
              <p class="text-sm leading-tight font-medium">{{ u.fullName }}</p>
              <p class="text-surface-500 dark:text-surface-400 text-xs leading-tight">
                {{ u.role }}
              </p>
            </div>
          </button>
          <p-menu #userMenu [model]="userMenuItems" [popup]="true" appendTo="body" />
        }
      </div>
    </div>
  </header>

  <main>
    <router-outlet />
  </main>
</div>
